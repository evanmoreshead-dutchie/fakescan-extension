<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FakeScan</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 16px;
      font-weight: 600;
      color: #a78bfa;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    input[type="text"] {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #e2e8f0;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus {
      border-color: #7c3aed;
    }

    input[type="text"]::placeholder {
      color: #4a5568;
    }

    button.scan-btn {
      background: #7c3aed;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      padding: 8px 14px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button.scan-btn:hover {
      background: #6d28d9;
    }

    button.scan-btn:active {
      background: #5b21b6;
    }

    .status {
      font-size: 11px;
      color: #48bb78;
      min-height: 16px;
      margin-bottom: 16px;
      transition: opacity 0.3s;
    }

    .status.error {
      color: #fc8181;
    }

    .history-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .history-label {
      font-size: 11px;
      font-weight: 600;
      color: #718096;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-size: 11px;
      padding: 2px 4px;
      border-radius: 3px;
      transition: color 0.15s;
    }

    .clear-btn:hover {
      color: #fc8181;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .history-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .history-item button.rescan-btn {
      flex: 1;
      background: #1e2130;
      border: 1px solid #2d3148;
      border-radius: 6px;
      color: #c4b5fd;
      cursor: pointer;
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      padding: 7px 10px;
      text-align: left;
      transition: background 0.15s, border-color 0.15s;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .history-item button.rescan-btn:hover {
      background: #252840;
      border-color: #7c3aed;
      color: #e2e8f0;
    }

    .history-item button.remove-btn {
      background: none;
      border: none;
      color: #4a5568;
      cursor: pointer;
      font-size: 14px;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      transition: color 0.15s;
    }

    .history-item button.remove-btn:hover {
      color: #fc8181;
    }

    .empty-state {
      font-size: 12px;
      color: #4a5568;
      padding: 8px 0;
    }
  </style>
</head>
<body>
  <h1>FakeScan</h1>

  <div class="input-row">
    <input type="text" id="barcode-input" placeholder="Enter barcode..." autofocus />
    <button class="scan-btn" id="scan-btn">Scan</button>
  </div>

  <div class="status" id="status"></div>

  <div class="history-header">
    <span class="history-label">History</span>
    <button class="clear-btn" id="clear-btn">Clear all</button>
  </div>

  <div class="history-list" id="history-list">
    <span class="empty-state">No scans yet.</span>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
